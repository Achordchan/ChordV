name: Release Desktop

on:
  push:
    tags:
      - "v*"

concurrency:
  group: chordv-desktop-release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            runner: macos-14
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            artifact_path: output/release/macos/*.dmg
          - platform: windows
            runner: windows-2022
            rust_targets: x86_64-pc-windows-msvc
            artifact_path: output/release/windows/*.exe
    defaults:
      run:
        shell: bash
    env:
      CHORDV_PUBLIC_BASE_URL: https://v.baymaxgroup.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify version matches tag
        run: |
          tag_name="${GITHUB_REF_NAME#v}"
          package_version="$(node -e 'const fs=require("node:fs"); const pkg=JSON.parse(fs.readFileSync("package.json", "utf8")); process.stdout.write(pkg.version);')"
          if [ "${package_version}" != "${tag_name}" ]; then
            echo "package.json 版本 ${package_version} 与 tag ${tag_name} 不一致" >&2
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install cargo-xwin
        if: matrix.platform == 'windows'
        run: cargo install cargo-xwin --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @chordv/shared build

      - name: Build desktop bundle
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then
            pnpm --filter @chordv/desktop exec node ./scripts/build-tauri-platform.mjs windows --target x86_64-pc-windows-msvc
          else
            pnpm --filter @chordv/desktop exec node ./scripts/build-tauri-platform.mjs macos
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ChordV ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.exe
