services:
  postgres:
    image: postgres:16
    container_name: chordv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chordv
      POSTGRES_USER: chordv
      POSTGRES_PASSWORD: chordv
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: chordv-api
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./releases:/data/releases
